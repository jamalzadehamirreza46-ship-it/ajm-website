<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ثبت آگهی | AJM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14110d; --panel: #1d1812; --panel-2: #241d15;
    --gold: #c9891a; --copper: #8a5a00; --cream: #f1ead9;
    --muted: #8c8377; --green: #4f8a5b; --red: #a8453a; --border: #33291b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    background: var(--bg); color: var(--cream); direction: rtl;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; background: rgba(20,17,13,0.9);
    border-bottom: 1px solid var(--border);
  }
  .logo { font-size: 20px; font-weight: 900; color: var(--gold); }
  nav a.back { color: var(--muted); font-size: 13px; }

  .wrap { max-width: 460px; margin: 0 auto; padding: 30px 20px 60px; }
  .top-title { text-align: center; margin-bottom: 26px; }
  .top-title h1 { font-size: 22px; margin-bottom: 6px; }
  .top-title p { font-size: 12.5px; color: var(--muted); }

  .progress {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-bottom: 30px;
  }
  .progress .pdot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--border);
  }
  .progress .pdot.active { background: var(--gold); }
  .progress .pline { width: 30px; height: 1px; background: var(--border); }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 26px 22px;
  }
  .field { margin-bottom: 16px; }
  label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--muted); }
  input, textarea {
    width: 100%; padding: 13px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--cream); font-size: 14px; font-family: 'Vazirmatn', Tahoma, sans-serif;
  }
  input:focus, textarea:focus { outline: none; border-color: var(--gold); }
  textarea { resize: vertical; min-height: 80px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn {
    width: 100%; padding: 14px; border-radius: 10px; border: none;
    font-weight: 700; font-size: 14.5px; cursor: pointer;
    font-family: 'Vazirmatn', Tahoma, sans-serif;
  }
  .btn-primary { background: var(--gold); color: #1a1206; }
  .btn-primary:disabled { opacity: 0.5; }
  .btn-ghost { background: transparent; color: var(--muted); font-size: 12.5px; margin-top: 10px; }

  .demo-note {
    background: rgba(201,137,26,0.1); border: 1px dashed var(--gold);
    border-radius: 8px; padding: 10px 12px; font-size: 11.5px;
    color: var(--gold); margin-bottom: 16px; line-height: 1.8;
  }
  .error-note {
    background: rgba(168,69,58,0.12); border: 1px solid var(--red);
    border-radius: 8px; padding: 10px 12px; font-size: 12px;
    color: #e0a89f; margin-bottom: 14px; display: none;
  }
  .success-box {
    text-align: center; padding: 20px 10px;
  }
  .success-box .check {
    width: 54px; height: 54px; border-radius: 50%;
    background: rgba(79,138,91,0.15); color: var(--green);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; margin: 0 auto 16px;
  }
  .success-box h3 { margin-bottom: 8px; }
  .success-box p { font-size: 13px; color: var(--muted); line-height: 1.9; }

  .verified-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(79,138,91,0.12); color: var(--green);
    font-size: 12px; padding: 8px 12px; border-radius: 8px;
    margin-bottom: 18px;
  }

  #step1, #step2, #step3, #stepSuccess { display: none; }
  #step1.active, #step2.active, #step3.active, #stepSuccess.active { display: block; }
</style>
</head>
<body>

<nav>
  <div class="logo">AJM</div>
  <a class="back" href="index.html">بازگشت &larr;</a>
</nav>

<div class="wrap">
  <div class="top-title">
    <h1>ثبت آگهی خودرو</h1>
    <p>ابتدا شماره موبایلت رو تایید کن، بعد اطلاعات ماشین رو وارد کن.</p>
  </div>

  <div class="progress" id="progressDots">
    <div class="pdot active" data-step="1"></div>
    <div class="pline"></div>
    <div class="pdot" data-step="2"></div>
    <div class="pline"></div>
    <div class="pdot" data-step="3"></div>
  </div>

  <div class="card">

    <!-- Step 1: Phone -->
    <div id="step1" class="active">
      <div class="error-note" id="err1"></div>
      <div class="field">
        <label>شماره موبایل</label>
        <input type="tel" id="phoneInput" placeholder="09xxxxxxxxx" maxlength="11">
      </div>
      <button class="btn btn-primary" id="sendCodeBtn">دریافت کد تایید</button>
    </div>

    <!-- Step 2: OTP -->
    <div id="step2">
      <div class="demo-note" id="demoNote"></div>
      <div class="error-note" id="err2"></div>
      <div class="field">
        <label>کد ۴ رقمی ارسال‌شده</label>
        <input type="tel" id="codeInput" placeholder="----" maxlength="4">
      </div>
      <button class="btn btn-primary" id="verifyCodeBtn">تایید کد</button>
      <button class="btn btn-ghost" id="backToStep1">اصلاح شماره موبایل</button>
    </div>

    <!-- Step 3: Listing form -->
    <div id="step3">
      <div class="verified-badge">✓ شماره موبایل تایید شد</div>
      <div class="error-note" id="err3"></div>
      <div class="field">
        <label>نام فروشنده</label>
        <input type="text" id="sellerName" placeholder="مثلاً امیررضا">
      </div>
      <div class="row2">
        <div class="field">
          <label>مدل خودرو</label>
          <input type="text" id="model" placeholder="مثلاً BMW 520i">
        </div>
        <div class="field">
          <label>سال ساخت</label>
          <input type="number" id="year" placeholder="1401">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>کارکرد (کیلومتر)</label>
          <input type="number" id="mileage" placeholder="45000">
        </div>
        <div class="field">
          <label>شهر</label>
          <input type="text" id="city" placeholder="تبریز">
        </div>
      </div>
      <div class="field">
        <label>قیمت پیشنهادی (تومان)</label>
        <input type="number" id="price" placeholder="850000000">
      </div>
      <div class="field">
        <label>توضیحات</label>
        <textarea id="desc" placeholder="وضعیت بدنه، بیمه، تصادف و..."></textarea>
      </div>
      <button class="btn btn-primary" id="submitListingBtn">ثبت آگهی</button>
    </div>

    <!-- Success -->
    <div id="stepSuccess">
      <div class="success-box">
        <div class="check">✓</div>
        <h3>آگهی با موفقیت ثبت شد</h3>
        <p id="successDetails"></p>
      </div>
    </div>

  </div>
</div>

<script>
let authToken = null;
let currentPhone = '';

function showStep(n) {
  document.querySelectorAll('#step1, #step2, #step3, #stepSuccess').forEach(el => el.classList.remove('active'));
  const target = n === 'success' ? 'stepSuccess' : 'step' + n;
  document.getElementById(target).classList.add('active');
  document.querySelectorAll('.pdot').forEach(d => {
    d.classList.toggle('active', Number(d.dataset.step) <= (n === 'success' ? 3 : n));
  });
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError(id) {
  document.getElementById(id).style.display = 'none';
}

document.getElementById('sendCodeBtn').addEventListener('click', async () => {
  hideError('err1');
  const phone = document.getElementById('phoneInput').value.trim();
  const btn = document.getElementById('sendCodeBtn');
  btn.disabled = true; btn.textContent = 'در حال ارسال...';

  try {
    const res = await fetch('/api/auth/send-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const data = await res.json();
    if (!res.ok) {
      showError('err1', data.error || 'خطایی رخ داد.');
      return;
    }
    currentPhone = phone;
    document.getElementById('demoNote').textContent =
      'حالت آزمایشی: چون هنوز به سرویس پیامک واقعی وصل نیستیم، کد تایید اینجا نشون داده می‌شه → ' + data.demoCode;
    showStep(2);
  } catch (err) {
    showError('err1', 'اتصال به سرور برقرار نشد.');
  } finally {
    btn.disabled = false; btn.textContent = 'دریافت کد تایید';
  }
});

document.getElementById('backToStep1').addEventListener('click', () => showStep(1));

document.getElementById('verifyCodeBtn').addEventListener('click', async () => {
  hideError('err2');
  const code = document.getElementById('codeInput').value.trim();
  const btn = document.getElementById('verifyCodeBtn');
  btn.disabled = true; btn.textContent = 'در حال بررسی...';

  try {
    const res = await fetch('/api/auth/verify-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: currentPhone, code })
    });
    const data = await res.json();
    if (!res.ok) {
      showError('err2', data.error || 'کد اشتباه است.');
      return;
    }
    authToken = data.token;
    showStep(3);
  } catch (err) {
    showError('err2', 'اتصال به سرور برقرار نشد.');
  } finally {
    btn.disabled = false; btn.textContent = 'تایید کد';
  }
});

document.getElementById('submitListingBtn').addEventListener('click', async () => {
  hideError('err3');
  const body = {
    sellerName: document.getElementById('sellerName').value,
    model: document.getElementById('model').value,
    year: document.getElementById('year').value,
    mileage: document.getElementById('mileage').value,
    city: document.getElementById('city').value,
    price: document.getElementById('price').value,
    desc: document.getElementById('desc').value
  };
  const btn = document.getElementById('submitListingBtn');
  btn.disabled = true; btn.textContent = 'در حال ثبت...';

  try {
    const res = await fetch('/api/listings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-auth-token': authToken },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) {
      showError('err3', data.error || 'خطا در ثبت آگهی.');
      return;
    }
    document.getElementById('successDetails').textContent =
      `${data.listing.model} — مدل ${data.listing.year} — ${data.listing.city}`;
    showStep('success');
  } catch (err) {
    showError('err3', 'اتصال به سرور برقرار نشد.');
  } finally {
    btn.disabled = false; btn.textContent = 'ثبت آگهی';
  }
});
</script>

</body>
</html>
