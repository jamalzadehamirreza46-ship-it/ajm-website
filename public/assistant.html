<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>دستیار هوشمند | AJM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14110d;
    --panel: #1d1812;
    --panel-2: #241d15;
    --gold: #c9891a;
    --copper: #8a5a00;
    --cream: #f1ead9;
    --muted: #8c8377;
    --green: #4f8a5b;
    --red: #a8453a;
    --border: #33291b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(201,137,26,0.07), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(138,90,0,0.08), transparent 45%);
    color: var(--cream);
    direction: rtl;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ===== Header with signature gauge ===== */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header a.back {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    margin-left: auto;
  }
  .gauge-wrap {
    position: relative;
    width: 46px;
    height: 46px;
    flex-shrink: 0;
  }
  .gauge-wrap svg { width: 100%; height: 100%; }
  .gauge-arc {
    fill: none;
    stroke: var(--border);
    stroke-width: 4;
  }
  .gauge-arc-active {
    fill: none;
    stroke: var(--gold);
    stroke-width: 4;
    stroke-dasharray: 75.4;
    stroke-dashoffset: 75.4;
    transition: stroke-dashoffset 0.6s ease;
  }
  .gauge-needle {
    position: absolute;
    top: 50%; left: 50%;
    width: 2px; height: 15px;
    background: var(--cream);
    transform-origin: top center;
    transform: translate(-50%, 0) rotate(-90deg);
    transition: transform 0.5s cubic-bezier(.4,1.4,.6,1);
    border-radius: 2px;
  }
  .gauge-wrap.thinking .gauge-needle {
    animation: sweep 0.9s ease-in-out infinite alternate;
  }
  @keyframes sweep {
    0%   { transform: translate(-50%, 0) rotate(-95deg); }
    100% { transform: translate(-50%, 0) rotate(95deg); }
  }
  .gauge-dot {
    position: absolute; top: 50%; left: 50%;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
    transform: translate(-50%, -50%);
  }
  .title-block h1 {
    font-size: 16px; font-weight: 700; color: var(--cream);
  }
  .title-block p {
    font-size: 11.5px; color: var(--muted); margin-top: 2px;
  }
  .title-block .status {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); margin-left: 5px;
  }

  /* ===== Chat area ===== */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 18px 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg { max-width: 84%; display: flex; flex-direction: column; gap: 6px; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 12px 15px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.85;
    white-space: pre-wrap;
  }
  .msg.user .bubble {
    background: var(--gold);
    color: #1a1206;
    border-bottom-left-radius: 4px;
    font-weight: 500;
  }
  .msg.bot .bubble {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--cream);
    border-bottom-right-radius: 4px;
  }
  .msg.bot .label, .msg.user .label {
    font-size: 10.5px; color: var(--muted); padding: 0 4px;
  }

  /* Price fairness gauge inline in bot messages */
  .price-gauge {
    width: 100%;
    max-width: 260px;
    margin-top: 6px;
  }
  .price-gauge .track {
    height: 8px;
    border-radius: 5px;
    background: linear-gradient(90deg, var(--green), var(--gold) 50%, var(--red));
    position: relative;
  }
  .price-gauge .marker {
    position: absolute;
    top: -4px;
    width: 3px;
    height: 16px;
    background: var(--cream);
    border-radius: 2px;
    transform: translateX(50%);
  }
  .price-gauge .label-row {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--muted); margin-top: 4px;
  }

  .suggestions {
    display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 4px 2px;
  }
  .chip {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--cream);
    font-size: 12.5px;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Vazirmatn', Tahoma, sans-serif;
  }
  .chip:active { background: var(--copper); }

  /* ===== Input bar ===== */
  #inputBar {
    display: flex;
    gap: 10px;
    padding: 12px 14px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #userInput {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 12px 16px;
    color: var(--cream);
    font-size: 14px;
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    outline: none;
  }
  #userInput:focus { border-color: var(--gold); }
  #sendBtn {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--gold);
    border: none;
    color: #1a1206;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #sendBtn:active { background: var(--copper); }
  #sendBtn:disabled { opacity: 0.5; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (prefers-reduced-motion: reduce) {
    .gauge-wrap.thinking .gauge-needle { animation: none; }
  }
</style>
</head>
<body>

<header>
  <div class="gauge-wrap" id="gauge">
    <svg viewBox="0 0 30 30">
      <path class="gauge-arc" d="M 4 24 A 12 12 0 1 1 26 24" />
      <path class="gauge-arc-active" id="gaugeArc" d="M 4 24 A 12 12 0 1 1 26 24" />
    </svg>
    <div class="gauge-needle" id="needle"></div>
    <div class="gauge-dot"></div>
  </div>
  <div class="title-block">
    <h1>دستیار هوشمند AJM</h1>
    <p><span class="status"></span>آماده پاسخ‌گویی — قیمت، آگهی، مقایسه</p>
  </div>
  <a class="back" href="index.html">بازگشت &larr;</a>
</header>

<div id="chat"></div>

<div class="suggestions" id="suggestions">
  <div class="chip" data-q="قیمت منصفانه پژو 207 مدل 99 چقدره؟">قیمت پژو ۲۰۷ ۹۹</div>
  <div class="chip" data-q="زیر ۱ میلیارد چه ماشینی تو تبریز هست؟">زیر ۱ میلیارد در تبریز</div>
  <div class="chip" data-q="امتیاز اعتماد یعنی چی؟">امتیاز اعتماد یعنی چی؟</div>
</div>

<div id="inputBar">
  <input type="text" id="userInput" placeholder="سوالت رو بپرس..." maxlength="500">
  <button id="sendBtn">&#10148;</button>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const gaugeEl = document.getElementById('gauge');
const gaugeArc = document.getElementById('gaugeArc');
const suggestionsEl = document.getElementById('suggestions');

function addMessage(text, sender, extraHTML) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + sender;
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = sender === 'user' ? 'شما' : 'AJM';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  if (extraHTML) {
    const extra = document.createElement('div');
    extra.innerHTML = extraHTML;
    wrap.appendChild(extra);
  }
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function setThinking(isThinking) {
  gaugeEl.classList.toggle('thinking', isThinking);
  gaugeArc.style.strokeDashoffset = isThinking ? '20' : '75.4';
  sendBtn.disabled = isThinking;
}

function priceGaugeHTML(percent, verdict) {
  // percent: 0 (به‌صرفه) تا 100 (بالاتر از بازار)
  return `
    <div class="price-gauge">
      <div class="track"><div class="marker" style="right:${percent}%;"></div></div>
      <div class="label-row"><span>به‌صرفه</span><span>${verdict}</span><span>بالاتر از بازار</span></div>
    </div>
  `;
}

async function sendMessage(text) {
  if (!text || !text.trim()) return;
  addMessage(text, 'user');
  inputEl.value = '';
  suggestionsEl.style.display = 'none';
  setThinking(true);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();

    if (!res.ok) {
      addMessage(data.error || 'خطایی رخ داد.', 'bot');
    } else {
      // اگه پاسخ درباره قیمت بود، یه گیج نمایشی (نمادین) هم نشون بده
      const mentionsPrice = /قیمت|میلیون|تومان/.test(data.reply);
      const extra = mentionsPrice ? priceGaugeHTML(50, 'قیمت منصفانه') : null;
      addMessage(data.reply, 'bot', extra);
    }
  } catch (err) {
    addMessage('اتصال به سرور برقرار نشد. مطمئن شو سرور روشنه.', 'bot');
  } finally {
    setThinking(false);
  }
}

sendBtn.addEventListener('click', () => sendMessage(inputEl.value));
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage(inputEl.value);
});
suggestionsEl.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => sendMessage(chip.dataset.q));
});

// پیام خوش‌آمد اولیه
addMessage('سلام! من دستیار AJM هستم. می‌تونم درباره قیمت منصفانه، آگهی‌های موجود، یا امتیاز اعتماد یک ماشین کمکت کنم.', 'bot');
</script>

</body>
</html>
